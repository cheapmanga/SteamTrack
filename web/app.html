<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App — steamtrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="bar">
    <a href="index.html" class="logo">steam<span>track</span></a>
    <nav>
      <a href="index.html">Apps</a>
      <a href="changes.html">Changes</a>
      <a href="about.html">About</a>
      <a href="/docs">API</a>
    </nav>
  </div>
</header>

<main>
  <div id="head"></div>
  <div id="notice"></div>
  <div class="tabs" id="tabs"></div>
  <div id="view"><p class="empty">Loading...</p></div>
</main>

<footer id="foot"></footer>

<script src="steamtrack.js"></script>
<script>
(async function () {
    const PAGE = 40;
    const appid = new URLSearchParams(location.search).get("appid");
    if (!appid) { location.replace("index.html"); return; }

    const headEl = document.getElementById("head");
    const noticeEl = document.getElementById("notice");
    const tabsEl = document.getElementById("tabs");
    const viewEl = document.getElementById("view");
    const footEl = document.getElementById("foot");

    let app = null, changes = [], depots = null, players = null, info = null;
    let sections = null, related = null, patches = null;
    let tab = location.hash.replace("#", "") || "info";
    let kind = "all", shown = 0, query = "";

    bindMedia(viewEl);

    // ----- En-tete -----
    function renderHead() {
        const wrap = el("div", "apphead");
        const img = el("img");
        img.src = app.header_image;
        img.alt = "";
        img.addEventListener("error", () => { img.style.visibility = "hidden"; });

        const body = el("div", "apphead-body");
        const title = el("h1", "", app.name || `App ${app.appid}`);
        title.append(el("span", "appid", String(app.appid)));
        body.append(title);

        const facts = el("div", "facts");
        const add = (label, value, mono) => {
            const box = el("div");
            box.append(el("span", "fact-label", label));
            box.append(el("span", "fact-value" + (mono ? " mono" : ""), value));
            facts.append(box);
        };
        add("Changes", String(app.changes));
        add("Latest build", app.latest_buildid || "-", true);
        if (players && players.stats) add("Players now", compact(players.stats.current), true);
        add("Last change", ago(app.last_change_at));
        // L'historique peut preceder la mise sous suivi si un export SteamDB a
        // ete importe : c'est sa profondeur qui interesse.
        add("History from", app.history_from ? stamp(app.history_from).split(",")[0] : "-");
        body.append(facts);

        wrap.append(img, body);
        headEl.replaceChildren(wrap);

        if (!app.depots_public) {
            noticeEl.replaceChildren(el("div", "notice",
                "This app requires a Steam token: Steam does not publish its depots. "
                + "Builds are detected through the changenumber, without their buildid."));
        }
    }

    // ----- Onglets -----
    function renderTabs() {
        const shots = (info && info.screenshots) ? info.screenshots.length : 0;
        const packs = (info && info.packages)
            ? info.packages.reduce((n, g) => n + (g.subs || []).length, 0) : 0;
        const defs = [
            ["info", "Store info", null],
            ["charts", "Charts", players && players.series ? players.series.length : 0],
            ["patches", "Patches", patches ? patches.length : 0],
            ["metadata", "Metadata", sections && sections.common
                ? Object.keys(sections.common).length : 0],
            ["packages", "Packages", packs],
            ["depots", "Depots", depots ? depots.depots.length : 0],
            ["branches", "Branches", depots ? depots.branches.length : 0],
            ["config", "Configuration", sections && sections.config
                ? Object.keys(sections.config).length : 0],
            ["cloud", "Cloud saves", sections && sections.ufs
                ? Object.keys(sections.ufs).length : 0],
            ["shots", "Screenshots", shots],
            ["related", "Related apps", related ? related.dlc.length : 0],
            ["history", "Update history", changes.length],
        ];
        tabsEl.replaceChildren(...defs.map(([key, label, n]) => {
            const btn = el("button", "tab" + (key === tab ? " on" : ""));
            btn.append(el("span", "", label));
            if (n !== null) btn.append(el("span", "n", String(n)));
            btn.addEventListener("click", () => {
                tab = key;
                location.hash = key;
                renderTabs();
                renderView();
            });
            return btn;
        }));
    }

    // ----- Vues -----
    function renderView() {
        const views = {
            history: renderHistory, depots: renderDepots, branches: renderBranches,
            charts: renderCharts, info: renderInfo, metadata: renderMetadata,
            config: renderConfig, cloud: renderCloud, shots: renderShots,
            related: renderRelated, packages: renderPackages, patches: renderPatches,
        };
        return (views[tab] || renderInfo)();
    }

    // Rend n'importe quelle section de l'appinfo en tableau cle/valeur.
    // C'est la matiere de Metadata, Configuration et Cloud saves : trois
    // onglets de SteamDB qui ne sont que trois sections du meme appinfo.
    function sectionTable(obj, empty) {
        if (!obj || !Object.keys(obj).length) {
            viewEl.replaceChildren(el("p", "empty", empty));
            return;
        }
        // Tous les assets de la section, pour que la visionneuse passe de l'un
        // a l'autre au lieu de s'ouvrir sur une seule image.
        const assets = collectAssets(appid, obj);
        const indexOf = url => assets.findIndex(a => a.src === url);

        const table = el("table", "mini");
        const body = el("tbody");
        const walk = (o, prefix) => {
            Object.entries(o).sort((a, b) => a[0].localeCompare(b[0])).forEach(([k, v]) => {
                const key = prefix ? `${prefix}/${k}` : k;
                if (v && typeof v === "object" && !Array.isArray(v)) {
                    if (Object.keys(v).length <= 12) return walk(v, key);
                    return;
                }
                const tr = el("tr");
                tr.append(el("th", "", key));
                const td = el("td", "mono");
                const text = Array.isArray(v) ? v.join(", ") : String(v);
                const url = Array.isArray(v) ? null : assetUrlFor(appid, v, k);

                if (url) {
                    // PICS ne donne qu'une reference : on la rend cliquable et
                    // survolable, sinon "8dbc7195..." reste illisible.
                    const link = el("a", "media asset-link", text);
                    link.href = url;
                    link.dataset.media = "image";
                    link.title = "Hover to preview, click to open";
                    link.addEventListener("click", ev => {
                        ev.preventDefault();
                        hidePreview();
                        openViewer(assets, Math.max(0, indexOf(url)));
                    });
                    td.append(link);
                } else {
                    td.textContent = text.length > 300 ? text.slice(0, 300) + "..." : text;
                }
                tr.append(td);
                body.append(tr);
            });
        };
        walk(obj, "");
        table.append(body);
        const wrap = el("div", "table-wrap");
        wrap.append(table);
        viewEl.replaceChildren(wrap);
    }

    function renderMetadata() {
        sectionTable(sections && sections.common, "No metadata recorded yet.");
    }

    function renderConfig() {
        sectionTable(sections && sections.config,
            "No configuration published for this app.");
    }

    function renderCloud() {
        const ufs = sections && sections.ufs;
        if (!ufs || !Object.keys(ufs).length) {
            viewEl.replaceChildren(el("p", "empty", "This app does not use Steam Cloud."));
            return;
        }
        sectionTable(ufs, "");
    }

    function renderPatches() {
        if (!patches || !patches.length) {
            viewEl.replaceChildren(el("p", "empty", "No build recorded yet."));
            return;
        }
        const table = el("table", "mini");
        const head = el("tr");
        ["Build ID", "Changelist", "Date", "Title"].forEach(h => head.append(el("th", "", h)));
        const thead = el("thead");
        thead.append(head);
        table.append(thead);
        const body = el("tbody");
        patches.forEach(p => {
            const tr = el("tr");
            tr.append(el("td", "mono", p.buildid || "-"));
            tr.append(el("td", "mono", p.change_number ? "#" + p.change_number : "-"));
            const d = el("td", "", ago(p.occurred_at));
            d.title = stamp(p.occurred_at);
            tr.append(d);
            tr.append(el("td", "", p.title));
            body.append(tr);
        });
        table.append(body);
        const wrap = el("div", "table-wrap");
        wrap.append(table);
        viewEl.replaceChildren(wrap);
    }

    function renderPackages() {
        const groups = (info && info.packages) || [];
        if (!groups.length) {
            viewEl.replaceChildren(el("p", "empty", "No package listed on the store."));
            return;
        }
        const table = el("table", "mini");
        const head = el("tr");
        ["Package", "Name", "Price"].forEach(h => head.append(el("th", "", h)));
        const thead = el("thead");
        thead.append(head);
        table.append(thead);
        const body = el("tbody");
        groups.forEach(g => (g.subs || []).forEach(sub => {
            const tr = el("tr");
            tr.append(el("td", "mono", String(sub.packageid || "-")));
            tr.append(el("td", "", sub.text || "-"));
            tr.append(el("td", "mono", sub.price != null
                ? (sub.price / 100).toFixed(2) : "-"));
            body.append(tr);
        }));
        table.append(body);
        const wrap = el("div", "table-wrap");
        wrap.append(table);
        viewEl.replaceChildren(wrap);
    }

    function renderShots() {
        const shots = (info && info.screenshots) || [];
        const movies = (info && info.movies) || [];
        if (!shots.length && !movies.length) {
            viewEl.replaceChildren(el("p", "empty", "No screenshot published."));
            return;
        }
        // Un seul jeu d'elements pour la visionneuse : videos d'abord, comme
        // sur la fiche Steam, puis les captures.
        const items = [
            ...movies.map(m => ({ kind: "video", src: m.mp4 || m.mp4_480 || m.webm,
                                  fallback: m.mp4_480 || m.webm,
                                  thumb: m.thumb, name: m.name })),
            ...shots.map(sc => ({ kind: "image", src: sc.full, thumb: sc.thumb })),
        ];

        const grid = el("div", "shots");
        items.forEach((item, index) => {
            const cell = el("button", "shot");
            const img = el("img");
            img.src = item.thumb;
            img.alt = item.name || "";
            img.loading = "lazy";
            cell.append(img);
            if (item.kind === "video") cell.append(el("span", "shot-tag", "VIDEO"));
            cell.addEventListener("click", () => openViewer(items, index));
            grid.append(cell);
        });
        viewEl.replaceChildren(grid);
    }

    function renderRelated() {
        if (!related || !related.dlc.length) {
            viewEl.replaceChildren(el("p", "empty",
                related && related.parent
                    ? `This app is content for app ${related.parent}.`
                    : "No related app found."));
            return;
        }
        const table = el("table", "mini");
        const head = el("tr");
        ["AppID", "Name", ""].forEach(h => head.append(el("th", "", h)));
        const thead = el("thead");
        thead.append(head);
        table.append(thead);
        const body = el("tbody");
        related.dlc.forEach(d => {
            const tr = el("tr");
            tr.append(el("td", "mono", String(d.appid)));
            const name = el("td");
            if (d.tracked) {
                const link = el("a", "", d.name || `App ${d.appid}`);
                link.href = `app.html?appid=${d.appid}`;
                name.append(link);
            } else {
                name.textContent = d.name || "(not tracked)";
            }
            tr.append(name);
            const flag = el("td");
            flag.append(el("span", "pill" + (d.tracked ? " public" : ""),
                d.tracked ? "tracked" : "DLC"));
            tr.append(flag);
            body.append(tr);
        });
        table.append(body);
        const wrap = el("div", "table-wrap");
        wrap.append(table);
        viewEl.replaceChildren(wrap);
    }

    function matching() {
        const q = query.trim().toLowerCase();
        return changes.filter(e => {
            if (kind !== "all" && !(e.types || [e.kind]).includes(kind)) return false;
            if (!q) return true;
            if (!e._hay) {
                const flat = nodes => (nodes || []).map(n =>
                    (n.seg || []).map(s => s.v).join("") + " " + flat(n.children)).join(" ");
                e._hay = [e.title, e.change_number, e.buildid,
                          e.source === "news" ? (e.changes || {}).body : flat(e.changes)]
                    .join(" ").toLowerCase();
            }
            return e._hay.includes(q);
        });
    }

    function renderHistory(keepScroll) {
        const counts = {};
        changes.forEach(e => (e.types || [e.kind]).forEach(t => counts[t] = (counts[t] || 0) + 1));

        const bar = el("div", "toolbar");
        const filters = el("div", "filters");
        const make = (key, label, n) => {
            const btn = el("button", "filter" + (key === kind ? " on" : ""));
            btn.append(el("span", "", label), el("span", "n", String(n)));
            btn.addEventListener("click", () => { kind = key; shown = 0; renderHistory(); });
            return btn;
        };
        filters.append(make("all", "All", changes.length));
        Object.entries(KINDS).forEach(([k, label]) => {
            if (counts[k]) filters.append(make(k, label, counts[k]));
        });

        const search = el("input", "search");
        search.type = "search";
        search.placeholder = "Filter (buildid, tags, depot...)";
        search.value = query;
        let timer = null;
        search.addEventListener("input", () => {
            clearTimeout(timer);
            timer = setTimeout(() => {
                query = search.value;
                shown = 0;
                const pos = window.scrollY;
                renderHistory(true);
                window.scrollTo(0, pos);
                document.querySelector(".search").focus();
            }, 160);
        });
        bar.append(filters, search);

        const feed = el("div");
        const more = el("button", "loadmore");
        const list = matching();

        function fill(append) {
            if (!append) feed.replaceChildren();
            if (!list.length) {
                feed.replaceChildren(el("p", "empty", "No matching changes."));
                more.hidden = true;
                return;
            }
            const frag = document.createDocumentFragment();
            list.slice(shown, shown + PAGE).forEach(e => frag.append(panel(e)));
            feed.append(frag);
            shown = Math.min(shown + PAGE, list.length);
            more.hidden = shown >= list.length;
            more.textContent = `Show more (${list.length - shown} remaining)`;
        }
        more.addEventListener("click", () => fill(true));

        shown = 0;
        fill();
        viewEl.replaceChildren(bar, feed, more);
    }

    function renderDepots() {
        if (!depots || !depots.depots.length) {
            viewEl.replaceChildren(el("p", "empty",
                depots && !depots.depots_public
                    ? "Steam does not publish this app's depots (token required)."
                    : "No depot recorded yet."));
            return;
        }
        const table = el("table", "mini");
        const head = el("tr");
        ["Depot", "Name", "OS", "Manifest", "Size", ""].forEach(h => head.append(el("th", "", h)));
        const thead = el("thead");
        thead.append(head);
        table.append(thead);

        const body = el("tbody");
        depots.depots.forEach(d => {
            const row = el("tr");
            row.append(el("td", "mono", String(d.depot)));
            row.append(el("td", "", d.name || "-"));
            row.append(el("td", "", (d.config || {}).oslist || (d.config || {}).osarch || "-"));
            row.append(el("td", "mono", d.manifest || "-"));
            row.append(el("td", "mono", bytes(d.size)));
            const flags = el("td");
            if (d.shared) flags.append(el("span", "pill", "shared"));
            if (d.depotfromapp) flags.append(el("span", "pill", "from " + d.depotfromapp));
            row.append(flags);
            body.append(row);
        });
        table.append(body);
        const wrap = el("div", "table-wrap");
        wrap.append(table);
        viewEl.replaceChildren(wrap);
    }

    function renderBranches() {
        if (!depots || !depots.branches.length) {
            viewEl.replaceChildren(el("p", "empty", "No branch recorded yet."));
            return;
        }
        const table = el("table", "mini");
        const head = el("tr");
        ["Branch", "Build ID", "Updated", "Description", ""].forEach(h => head.append(el("th", "", h)));
        const thead = el("thead");
        thead.append(head);
        table.append(thead);

        const body = el("tbody");
        depots.branches.forEach(b => {
            const row = el("tr");
            const name = el("td");
            name.append(el("span", "pill" + (b.name === "public" ? " public" : ""), b.name));
            row.append(name);
            row.append(el("td", "mono", b.buildid || "-"));
            row.append(el("td", "", b.updated
                ? ago(new Date(Number(b.updated) * 1000).toISOString()) : "-"));
            row.append(el("td", "", b.description || "-"));
            row.append(el("td", "", b.protected ? "password" : ""));
            body.append(row);
        });
        table.append(body);
        const wrap = el("div", "table-wrap");
        wrap.append(table);
        viewEl.replaceChildren(wrap);
    }

    function renderCharts() {
        const parts = [];
        const st = players && players.stats;
        if (st) {
            parts.push(statRow([
                ["Now", compact(st.current)],
                ["Peak recorded", compact(st.peak)],
                ["Low", compact(st.low)],
                ["Average", compact(st.average)],
                ["Samples", String(st.samples)],
            ]));
        }
        parts.push(playerChart((players && players.series) || []));
        parts.push(el("p", "sub",
            "Steam publishes only the current player count, never past figures: "
            + "this curve starts when tracking began and fills in every 10 minutes."));
        viewEl.replaceChildren(...parts);
    }

    function renderInfo() {
        if (!info) {
            viewEl.replaceChildren(el("p", "empty", "No store details recorded yet."));
            return;
        }
        const table = el("table", "mini");
        const body = el("tbody");
        const row = (k, v) => {
            if (v === null || v === undefined || v === "" ||
                (Array.isArray(v) && !v.length)) return;
            const tr = el("tr");
            tr.append(el("th", "", k));
            tr.append(el("td", "", Array.isArray(v) ? v.join(", ") : String(v)));
            body.append(tr);
        };
        row("Name", info.name);
        row("Type", info.type);
        row("Release date", info.release_date + (info.coming_soon ? " (coming soon)" : ""));
        row("Developers", info.developers);
        row("Publishers", info.publishers);
        row("Genres", info.genres);
        row("Categories", info.categories);
        row("Metacritic", info.metacritic);
        row("Free to play", info.is_free ? "yes" : "no");
        row("Platforms", Object.entries(info.platforms || {})
            .filter(([, on]) => on).map(([os]) => os));
        row("Website", info.website);
        table.append(body);
        const wrap = el("div", "table-wrap");
        wrap.append(table);
        viewEl.replaceChildren(wrap);
    }

    // ----- Chargement -----
    // L'API plafonne a 500 entrees par appel : on pagine jusqu'a tout avoir,
    // sinon l'historique parait tronque sans le dire (852 changements pour
    // Fading Echo, dont 352 restaient invisibles).
    // Plafond de pagination initiale.
    //
    // La page chargeait TOUT l'historique par pages de 500 avant d'afficher
    // quoi que ce soit. Sur un jeu a 15 000 changements cela faisait 30 requetes
    // pour la seule visite (37 avec le reste de la page) et 2,7 Mio de JSON ;
    // le rafraichissement automatique rejouant loadAll() toutes les 5 minutes,
    // un onglet simplement laisse ouvert consommait ~420 requetes/heure et
    // epuisait seul le quota anonyme de 600.
    //
    // 6 pages = 3000 changements : au-dela, l'interet d'un historique complet
    // en memoire est nul (les listes sont paginees a l'ecran de toute façon) et
    // `total`, renvoye par l'API, reste exact pour l'affichage des compteurs.
    const MAX_PAGES = 6;

    async function loadAllChanges() {
        const out = [];
        for (let page = 0; page < MAX_PAGES; page++) {
            const data = await api(
                `/v1/apps/${appid}/changes?limit=500&offset=${page * 500}`);
            const batch = data.changes || [];
            out.push(...batch);
            if (!batch.length || out.length >= (data.total || 0)) break;
        }
        return out;
    }

    async function loadAll() {
        const [a, c, d, p, i, sec, rel, pat] = await Promise.all([
            api(`/v1/apps/${appid}`),
            loadAllChanges(),
            api(`/v1/apps/${appid}/depots`).catch(() => null),
            api(`/v1/apps/${appid}/players`).catch(() => null),
            api(`/v1/apps/${appid}/info`).catch(() => null),
            api(`/v1/apps/${appid}/sections`).catch(() => null),
            api(`/v1/apps/${appid}/related`).catch(() => null),
            api(`/v1/apps/${appid}/patches`).catch(() => null),
        ]);
        const before = changes.length ? new Set(changes.map(e => e.id)) : null;
        app = a;
        changes = c;
        depots = d;
        players = p;
        info = i ? i.details : null;
        sections = sec ? sec.sections : null;
        related = rel;
        patches = pat ? pat.patches : null;
        return before ? changes.filter(e => !before.has(e.id)).length : 0;
    }

    try {
        await loadAll();
        document.title = `${app.name || appid} — steamtrack`;
        renderHead();
        renderTabs();
        renderView();

        footEl.replaceChildren(autoRefresh({
            reload: async () => {
                const scroll = window.scrollY;
                const fresh = await loadAll();
                renderHead();
                renderTabs();
                renderView();
                window.scrollTo(0, scroll);
                return fresh;
            },
        }));
    } catch (err) {
        viewEl.replaceChildren(el("p", "empty err", "Could not load: " + err.message));
    }
})();
</script>
</body>
</html>
